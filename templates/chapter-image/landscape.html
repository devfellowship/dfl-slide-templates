<div class="tpl-root tpl-chapter-image">
  <img src="{{imageUrl}}" alt="{{imageAlt}}" class="tpl-chapter-image__bg" />
  <div class="tpl-chapter-image__scrim"></div>
  <div class="tpl-chapter-image__content">
    {{#chapterNumber}}<span class="tpl-chapter-image__number">{{chapterNumber}}</span>{{/chapterNumber}}
    <h1 class="tpl-chapter-image__title">{{title}}</h1>
    {{#subtitle}}<p class="tpl-chapter-image__subtitle">{{subtitle}}</p>{{/subtitle}}
  </div>
</div>
