id: image
name: Image Slide
version: "1.0.0"
category: content
slots:
  - name: imageUrl
    type: image
    required: true
    description: "URL of the image to display"
    sample: "https://placehold.co/1200x800/1e293b/94a3b8?text=Your+Image+Here"
  - name: description
    type: text
    required: false
    description: "Caption text displayed below the image"
    sample: "A picture is worth a thousand words"
