<div class="tpl-root tpl-img-text">
  <div class="tpl-img-text__image-pane">
    <img src="{{imageUrl}}" alt="{{imageAlt}}" class="tpl-img-text__image" />
  </div>
  <div class="tpl-img-text__text-pane">
    {{#title}}
    <h2 class="tpl-img-text__title">{{title}}</h2>
    {{/title}}
    <div class="tpl-img-text__body">{{{body}}}</div>
  </div>
</div>
