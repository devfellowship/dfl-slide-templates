id: kpi
name: KPI Grid
version: "1.0.0"
category: data
slots:
  - name: eyebrow
    type: text
    required: false
    description: "Short uppercase label rendered above the title (e.g. 'Snapshot')"
    sample: "Snapshot"
  - name: title
    type: text
    required: true
    description: "Slide heading"
    sample: "Cohort 23 · By the numbers"
  - name: items
    type: items
    required: true
    description: |
      Array of KPI cards. Each item has:
        label   — uppercase metric name
        value   — the headline number/text
        delta   — optional change indicator (use ▲/▼ as a prefix)
        brand   — optional boolean, if true the card is rendered in brand colours
    sample:
      - label: "Fellows"
        value: "248"
        delta: "▲ 32 vs 22"
        brand: true
      - label: "Companies"
        value: "17"
        delta: "▲ 5 new"
      - label: "Lessons"
        value: "94"
      - label: "Avg NPS"
        value: "9.2"
        delta: "▲ +0.4"
      - label: "Completion"
        value: "87%"
        delta: "▲ +6 pp"
      - label: "Repos shipped"
        value: "1.4k"
