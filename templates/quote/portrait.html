<div class="tpl-root tpl-quote">
  <div class="tpl-quote__inner">
    <div class="tpl-quote__mark">&ldquo;</div>
    <blockquote class="tpl-quote__text">{{quote}}</blockquote>
    <div class="tpl-quote__attribution">
      {{#author}}<span class="tpl-quote__author">{{author}}</span>{{/author}}
      {{#source}}<span class="tpl-quote__source">{{source}}</span>{{/source}}
    </div>
  </div>
</div>
