name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: development

jobs:
  lint-css:
    name: Lint CSS scoping
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CSS lint
        run: npm run lint:css

  preview-regen:
    name: Regenerate previews
    runs-on: ubuntu-latest
    needs: lint-css
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate previews
        run: npm run preview

      - name: Check for preview drift
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet; then
            echo "::warning::Preview images differ from committed versions. Run 'npm run preview' locally and commit the results."
            git diff --stat
            exit 1
          fi
