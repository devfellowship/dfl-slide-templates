id: logo-wall
name: Logo Wall
version: "1.0.0"
category: media
slots:
  - name: title
    type: text
    required: false
    description: "Optional heading above the logo grid (e.g. 'Trusted by', 'Built with')"
    sample: "Tools we use"
  - name: eyebrow
    type: text
    required: false
    description: "Optional small uppercase label shown above the title"
    sample: "Our stack"
  - name: logos
    type: items
    required: true
    description: |
      Array of logo images rendered in a bordered grid. Each item:
        url  — logo image URL (required)
        alt  — alt text / logo name for accessibility (required)
        name — display name shown below the logo (optional)
    sample:
      - url: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=200&auto=format&fit=crop"
        alt: "TypeScript"
        name: "TypeScript"
      - url: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=200&auto=format&fit=crop"
        alt: "React"
        name: "React"
      - url: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=200&auto=format&fit=crop"
        alt: "Node.js"
        name: "Node.js"
      - url: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=200&auto=format&fit=crop"
        alt: "Supabase"
        name: "Supabase"
      - url: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=200&auto=format&fit=crop"
        alt: "Grafana"
        name: "Grafana"
      - url: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=200&auto=format&fit=crop"
        alt: "Docker"
        name: "Docker"
