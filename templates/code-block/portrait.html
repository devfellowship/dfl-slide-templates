<div class="tpl-root tpl-code-block">
  {{#title}}
  <h2 class="tpl-code-block__title">{{title}}</h2>
  {{/title}}
  <div class="tpl-code-block__container">
    {{#language}}
    <div class="tpl-code-block__lang-badge">{{language}}</div>
    {{/language}}
    <pre class="tpl-code-block__pre"><code class="tpl-code-block__code">{{code}}</code></pre>
  </div>
</div>
