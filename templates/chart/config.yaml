id: chart
name: Chart
version: "1.0.0"
category: data
slots:
  - name: title
    type: text
    required: false
    description: "Optional heading displayed above the chart"
    sample: "Monthly Growth"
  - name: chartType
    type: select
    required: true
    description: "Chart type"
    options:
      - bar
      - line
      - pie
    sample: "bar"
  - name: data
    type: json
    required: true
    description: "JSON data object for the chart (labels and datasets arrays)"
    sample: '{"labels":["Jan","Feb","Mar"],"datasets":[{"label":"Revenue","data":[12,19,8]}]}'
