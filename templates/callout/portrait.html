<div class="tpl-root tpl-callout tpl-callout--portrait">
  <div class="tpl-callout__card">
    <div class="tpl-callout__icon">{{#icon}}{{icon}}{{/icon}}{{^icon}}!{{/icon}}</div>
    {{#eyebrow}}<span class="tpl-callout__eyebrow">{{eyebrow}}</span>{{/eyebrow}}
    <h3 class="tpl-callout__title">{{title}}</h3>
    {{#body}}<p class="tpl-callout__body">{{body}}</p>{{/body}}
  </div>
</div>
