<div class="tpl-root tpl-stat-number tpl-stat-number--portrait">
  <div class="tpl-stat-number__inner">
    {{#eyebrow}}<span class="tpl-stat-number__eyebrow">{{eyebrow}}</span>{{/eyebrow}}
    <div class="tpl-stat-number__value">{{value}}</div>
    <p class="tpl-stat-number__label">{{label}}</p>
    {{#source}}<span class="tpl-stat-number__source">{{source}}</span>{{/source}}
  </div>
</div>
