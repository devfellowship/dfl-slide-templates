<div class="tpl-root tpl-two-column">
  {{#title}}
  <h2 class="tpl-two-column__title">{{title}}</h2>
  {{/title}}
  <div class="tpl-two-column__columns">
    <div class="tpl-two-column__col tpl-two-column__col--left">
      {{{leftContent}}}
    </div>
    <div class="tpl-two-column__divider"></div>
    <div class="tpl-two-column__col tpl-two-column__col--right">
      {{{rightContent}}}
    </div>
  </div>
</div>
