id: title
name: Title Slide
version: "1.0.0"
category: content
slots:
  - name: title
    type: text
    required: true
    description: "Main title text displayed prominently in the center"
    sample: "Welcome to the Platform"
  - name: subtitle
    type: text
    required: false
    description: "Optional subtitle text displayed below the main title"
    sample: "A modern foundation for your presentations"
