<div class="tpl-root tpl-title-image tpl-title-image--portrait">
  <div class="tpl-title-image__media">
    <img src="{{imageUrl}}" alt="{{imageAlt}}" class="tpl-title-image__img" />
  </div>
  <div class="tpl-title-image__panel">
    {{#eyebrow}}<span class="tpl-title-image__eyebrow">{{eyebrow}}</span>{{/eyebrow}}
    <h1 class="tpl-title-image__title">{{title}}</h1>
    {{#subtitle}}<p class="tpl-title-image__subtitle">{{subtitle}}</p>{{/subtitle}}
  </div>
</div>
