<div class="tpl-root tpl-section-header tpl-section-header--portrait">
  <div class="tpl-section-header__chapter">{{chapterNo}}</div>
  <div class="tpl-section-header__meta">
    {{#eyebrow}}<span class="tpl-section-header__eyebrow">{{eyebrow}}</span>{{/eyebrow}}
    <h2 class="tpl-section-header__title">{{title}}</h2>
    {{#description}}<p class="tpl-section-header__description">{{description}}</p>{{/description}}
  </div>
</div>
