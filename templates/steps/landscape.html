<div class="tpl-root tpl-steps">
  {{#eyebrow}}<span class="dfl-eyebrow">{{eyebrow}}</span>{{/eyebrow}}
  <h2 class="dfl-section-title tpl-steps__title">{{title}}</h2>
  <div class="dfl-section-rule"></div>
  <div class="tpl-steps__rail">
    {{#items}}
    <div class="tpl-steps__step">
      <div class="tpl-steps__num"></div>
      <h4 class="tpl-steps__name">{{text}}</h4>
    </div>
    {{/items}}
  </div>
</div>
