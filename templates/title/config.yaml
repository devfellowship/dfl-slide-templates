id: title
name: Title Slide
version: "2.0.0"
category: content
slots:
  - name: title
    type: text
    required: true
    description: "Main display title (cream, large)"
  - name: subtitle
    type: text
    required: false
    description: "Optional subhead displayed below the main title"
  - name: lessonNumber
    type: text
    required: false
    description: "Mono uppercase eyebrow above the title, e.g. 'LESSON · 02'"
