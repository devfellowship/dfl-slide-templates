<div class="tpl-root tpl-big-image">
  <div class="tpl-big-image__frame">
    <img src="{{imageUrl}}" alt="{{imageAlt}}" class="tpl-big-image__img" />
  </div>
  {{#title}}
  <div class="tpl-big-image__bar">
    <span class="tpl-big-image__title">{{title}}</span>
    {{#caption}}<span class="tpl-big-image__caption">{{caption}}</span>{{/caption}}
  </div>
  {{/title}}
</div>
